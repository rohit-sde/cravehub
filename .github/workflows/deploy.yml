name: Deploy App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_HOST_URL: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ vars.AWS_ECR_REGION }}.amazonaws.com
  ECR_REPOSITORY_URL: ${{ secrets.AWS_ACCOUNT_NUMBER }}.dkr.ecr.${{ vars.AWS_ECR_REGION }}.amazonaws.com/${{ vars.AWS_ECR_REPOSITORY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: FE - Install Deps
        run: cd frontend && npm i

      - name: FE - Build
        run: cd frontend && npm run build:prod

      - name: BE - Install Deps
        run: cd backend && npm i

      - name: Setup FE
        run: cp -r frontend/build/* backend/public

      - name: Setup FE1
        run: |
          ls -al backend
      - name: Setup FE2
        run: |
          ls -al backend/public
